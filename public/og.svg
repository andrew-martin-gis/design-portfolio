<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060f28"/>
      <stop offset="100%" stop-color="#020818"/>
    </linearGradient>
    <linearGradient id="glow-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#020818" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rule-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- Atmospheric glow top-left -->
  <ellipse cx="200" cy="200" rx="400" ry="300" fill="url(#glow-grad)"/>

  <!-- Dot-grid decoration (right side) -->
  <g fill="rgba(59,130,246,0.18)">
    <circle cx="820" cy="140" r="2.5"/><circle cx="860" cy="140" r="2.5"/><circle cx="900" cy="140" r="2.5"/>
    <circle cx="940" cy="140" r="2.5"/><circle cx="980" cy="140" r="2.5"/><circle cx="1020" cy="140" r="2.5"/>
    <circle cx="820" cy="180" r="2.5"/><circle cx="860" cy="180" r="2.5"/><circle cx="900" cy="180" r="2.5"/>
    <circle cx="940" cy="180" r="2.5"/><circle cx="980" cy="180" r="2.5"/><circle cx="1020" cy="180" r="2.5"/>
    <circle cx="820" cy="220" r="2.5"/><circle cx="860" cy="220" r="2.5"/><circle cx="900" cy="220" r="2.5"/>
    <circle cx="940" cy="220" r="2.5"/><circle cx="980" cy="220" r="2.5"/><circle cx="1020" cy="220" r="2.5"/>
    <circle cx="820" cy="260" r="2.5"/><circle cx="860" cy="260" r="2.5"/><circle cx="900" cy="260" r="2.5"/>
    <circle cx="940" cy="260" r="2.5"/><circle cx="980" cy="260" r="2.5"/><circle cx="1020" cy="260" r="2.5"/>
    <circle cx="820" cy="300" r="2.5"/><circle cx="860" cy="300" r="2.5"/><circle cx="900" cy="300" r="2.5"/>
    <circle cx="940" cy="300" r="2.5"/><circle cx="980" cy="300" r="2.5"/><circle cx="1020" cy="300" r="2.5"/>
    <circle cx="820" cy="340" r="2.5"/><circle cx="860" cy="340" r="2.5"/><circle cx="900" cy="340" r="2.5"/>
    <circle cx="940" cy="340" r="2.5"/><circle cx="980" cy="340" r="2.5"/><circle cx="1020" cy="340" r="2.5"/>
    <circle cx="820" cy="380" r="2.5"/><circle cx="860" cy="380" r="2.5"/><circle cx="900" cy="380" r="2.5"/>
    <circle cx="940" cy="380" r="2.5"/><circle cx="980" cy="380" r="2.5"/><circle cx="1020" cy="380" r="2.5"/>
    <circle cx="820" cy="420" r="2.5"/><circle cx="860" cy="420" r="2.5"/><circle cx="900" cy="420" r="2.5"/>
    <circle cx="940" cy="420" r="2.5"/><circle cx="980" cy="420" r="2.5"/><circle cx="1020" cy="420" r="2.5"/>
    <circle cx="820" cy="460" r="2.5"/><circle cx="860" cy="460" r="2.5"/><circle cx="900" cy="460" r="2.5"/>
    <circle cx="940" cy="460" r="2.5"/><circle cx="980" cy="460" r="2.5"/><circle cx="1020" cy="460" r="2.5"/>
  </g>

  <!-- Glowing accent circle (top-right) -->
  <circle cx="1050" cy="120" r="80" fill="none" stroke="rgba(59,130,246,0.12)" stroke-width="1"/>
  <circle cx="1050" cy="120" r="55" fill="none" stroke="rgba(59,130,246,0.18)" stroke-width="1"/>
  <circle cx="1050" cy="120" r="30" fill="rgba(59,130,246,0.08)"/>

  <!-- Left content -->
  <!-- Accent rule -->
  <rect x="80" y="220" width="48" height="2" fill="url(#rule-grad)"/>

  <!-- Name -->
  <text x="80" y="310" font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="80" font-weight="200" letter-spacing="-1" fill="#f0f6ff">Andrew</text>
  <text x="80" y="400" font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="80" font-weight="200" letter-spacing="-1" fill="#f0f6ff">Martin</text>

  <!-- Role -->
  <text x="80" y="460" font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="17" font-weight="300" letter-spacing="5" fill="#60a5fa">DIGITAL MAP DESIGNER · GIS ANALYST</text>

  <!-- Separator -->
  <rect x="80" y="500" width="560" height="1" fill="rgba(255,255,255,0.07)"/>

  <!-- URL -->
  <text x="80" y="530" font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="14" letter-spacing="2" fill="rgba(255,255,255,0.22)">www.gisdev.me</text>
</svg>
